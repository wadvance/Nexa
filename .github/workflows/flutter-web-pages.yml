name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets (Places API key may be empty)
        run: |
          cat > .env <<EOF
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
          EOF
          echo ".env generated (lengths: openrouter=${#OPENROUTER_API_KEY}, openweather=${#OPENWEATHERMAP_API_KEY})"
          test -n "$OPENROUTER_API_KEY" || (echo "ERROR: OPENROUTER_API_KEY secret is missing"; exit 1)

      - name: Enable web
        run: flutter config --enable-web

      - name: Build for web (base-href /Nexa/)
        run: flutter build web --release --base-href /Nexa/ --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Prepare 404.html fallback
        run: cp build/web/index.html build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
