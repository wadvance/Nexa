name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Enable web
        run: flutter config --enable-web

      - name: Verify Flutter
        run: flutter --version && dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
          EOF
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "FATAL: OPENROUTER_API_KEY secret empty"
            exit 1
          fi
          echo ".env created"

      - name: Build web
        run: flutter build web --release --base-href /Nexa/ --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Inspect build output
        run: |
          echo "--- build/web contents ---"
          ls -la build/web
          echo "--- top-level files count ---"
          find build/web -maxdepth 1 -type f | wc -l
          echo "--- 404 fallback ---"
          cp build/web/index.html build/web/404.html
          ls -la build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
