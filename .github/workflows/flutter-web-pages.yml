name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY || '' }}
    steps:
      - name: Show node version
        run: echo "node: $(node --version)  flutter/dart will be set up next"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Enable web
        run: flutter config --enable-web

      - name: Verify Flutter
        run: flutter --version && dart --version

      - name: Upgrade Flutter / Dart (no-op if already current)
        run: flutter pub get || (flutter pub upgrade --major-versions --null-safety && flutter pub get)

      - name: Doctor (informational)
        run: flutter doctor -v || true

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
          EOF
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "FATÁL: OPENROUTER_API_KEY secret vacío"
            exit 1
          fi
          echo "OK: openrouter secret length=${#OPENROUTER_API_KEY}"

      - name: Build web
        run: |
          flutter build web --release \
            --base-href /Nexa/ \
            --dart-define=FLUTTER_WEB_USE_SKIA=true \
            2>&1 | tee build.log
          echo "--- last 50 lines of build log ---"
          tail -n 50 build.log

      - name: Prepare 404.html fallback
        run: cp build/web/index.html build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
