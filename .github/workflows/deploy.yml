name: AETHERIS — Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para que el action pueda publicar en gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build Flutter Web + Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Flutter estable
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 3. Crear .env desde los Secrets del repositorio
      #    Ve a: GitHub repo → Settings → Secrets → Actions → New secret
      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }}
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          EOF

      # 4. Instalar dependencias
      - name: Get dependencies
        run: flutter pub get

      # 5. Analizar código (no falla el build por warnings)
      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      # 6. Build web con base-href del repositorio
      #    Cambia "nexa-aetheris" por el nombre exacto de tu repo en GitHub
      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --web-renderer canvaskit

      # 7. Deploy a la rama gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          # Mantiene el historial limpio en gh-pages
          force_orphan: true
          # Mensaje del commit en la rama gh-pages
          commit_message: "deploy: ${{ github.sha }}"
