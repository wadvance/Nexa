name: AETHERIS — CI (Analyze + Test + Build)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Análisis estático + tests
  # ─────────────────────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          printf 'GEMINI_API_KEY=%s\nOPENROUTER_API_KEY=%s\nGOOGLE_MAPS_API_KEY=%s\nOPENWEATHERMAP_API_KEY=%s\nFIREBASE_API_KEY=%s\n' \
            "${{ secrets.GEMINI_API_KEY }}" \
            "${{ secrets.OPENROUTER_API_KEY }}" \
            "${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            "${{ secrets.OPENWEATHERMAP_API_KEY }}" \
            "${{ secrets.FIREBASE_API_KEY }}" \
            > .env

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Android APK (debug — para descarga directa)
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          printf 'GEMINI_API_KEY=%s\nOPENROUTER_API_KEY=%s\nGOOGLE_MAPS_API_KEY=%s\nOPENWEATHERMAP_API_KEY=%s\nFIREBASE_API_KEY=%s\n' \
            "${{ secrets.GEMINI_API_KEY }}" \
            "${{ secrets.OPENROUTER_API_KEY }}" \
            "${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            "${{ secrets.OPENWEATHERMAP_API_KEY }}" \
            "${{ secrets.FIREBASE_API_KEY }}" \
            > .env

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aetheris-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
